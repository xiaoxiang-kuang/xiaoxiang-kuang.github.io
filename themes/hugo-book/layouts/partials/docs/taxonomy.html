<!--tags-->
<nav>
  <ul>
  {{ range $term, $_ := .Site.Taxonomies }}
    {{ with $.Site.GetPage (printf "/%s" $term | urlize) }}
	  {{ if eq .Title "Tags" }}
		{{ range .Pages }}
		  <li>
			<a href="{{ .RelPermalink }}"  class="flex justify-between">
			  <span>{{ .Title }}</span>
			  <span>{{ len .Pages }}</span>
			</a>
		  </li>
		{{ end }}
      {{ end }}
	{{ end }}
  {{ end }}
  </ul>
</nav>
